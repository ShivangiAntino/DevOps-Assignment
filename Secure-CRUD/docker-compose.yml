services:
  db:
    image: postgres:15-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - dbdata:/var/lib/postgresql/data
    networks:
      - secure_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file: .env
    environment:
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}
      PORT: ${PORT}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - secure_net

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT}:80"
    environment:
      - PROXY_PASS_HOST=${PROXY_PASS_HOST}
      - PROXY_PASS_PORT=${PROXY_PASS_PORT}
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
    depends_on:
      - app
    networks:
      - secure_net

volumes:
  dbdata:


networks:
  secure_net:
    driver: bridge
